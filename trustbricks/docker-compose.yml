version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: trustbricks-postgres
    restart: always
    environment:
      POSTGRES_USER: trustbricks_user
      POSTGRES_PASSWORD: trustbricks_password_secure
      POSTGRES_DB: trustbricks_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
